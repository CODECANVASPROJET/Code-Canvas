<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css" />
    <title>Code Canvas</title>
</head>
<body>
    
    <div class="barMenu"></div>
    <div class="titreMenu">
        <h1>MENU</h1>
    </div>
    <div class="separationMenu"></div>
    <div class="screen"></div> 
    <div class="images">
        <img src="images/LOGO-CC.png" alt="Logo CODE CANVAS" title="Logo CODE CANVAS" />
    </div>
    <div class="container">
        <div class="bloc">
            <span class="corner material-symbols-outlined">open_in_full</span>
            <div class="bar">
                <div class="texte">
                    <p>HTML</p>
                </div>
            </div>
            <iframe
                id="windowHtml"
                src="./iframes/html/windowH.html" 
                >
            </iframe>
        </div>
        
        <div class="bloc">
            <span class="corner material-symbols-outlined">open_in_full</span>
            <div class="bar">
                <div class="texte">
                    <p>CSS</p>
                </div>
            </div>
            <iframe
                id="windowCss"
                src="./iframes/css/windowC.html"
                >
            </iframe>
        </div>

        <div class="bloc">
            <span class="corner material-symbols-outlined">open_in_full</span>
            <div class="bar">
                <div class="texte">
                    <p>JS</p>
                </div>
            </div>
            <iframe
                id="windowJs"
                src="./iframes/js/windowJ.html"
                >
            </iframe>
        </div>

        <div class="bloc">
            <div class="dropRender"></div>
            <span class="corner material-symbols-outlined">open_in_full</span>
            <div class="bar">
                <div class="texte">
                    <p>Rendu</p>
                </div>
            </div>
            <iframe
                id="windowRender"
                sandbox="allow-scripts">
            </iframe>
        </div>

        <div class="bloc">
            <span class="corner material-symbols-outlined">open_in_full</span>
            <div class="bar">
                <div class="texte">
                    <p>Modèle</p>
                </div>
                <button id="resize" onclick="toggleMini(this)">
                    <span class="size material-symbols-outlined">picture_in_picture_alt</span>
                </button>
                <button id="close" onclick="closeModel(this)">x</button>
            </div>
            <iframe
                id="windowModel"
                src="./learn/layout/layout1.html">
            </iframe>
        </div>
    </div>

    <div id="consoleOutput"></div>

    <button id="btnConsole" onclick="toggleConsole()" alt="Afficher la console du Java Script" title="Afficher la console du Java Script">CONSOLE</button>
    <button id="btnDownload" onclick="downloadHtmlFile()" alt="Télécharger un fichier HTML regroupant tout" title="Télécharger un fichier HTML regroupant tout">EXPORTER</button>
    <button id="btnLearn" onclick="modelView()" alt="Modèles d'apprentissages" title="Modèles d'apprentissages">APPRENDRE</button>
    <button id="btnModel" onclick="modelDispositions()" alt="Modèles de mise en page par défaut" title="Modèles de mise en page par défaut">MODELES</button>
    <button id="btnReload" onclick="reloadPage()" alt="Position des fenêtres par défaut" title="Position des fenêtres par défaut">RAFRAICHIR</button>
    <button id="btnClear" onclick="storageClear()" alt="Supprimer le contenu des fenêtres" title="Supprimer le contenu des fenêtres">NETTOYER</button>
    <div id="btnLearning">
        <div class="buttonsCenter">
            <button class="btnLayout" onclick="showLayouts()">LAYOUT</button>

            <div id="layoutButtons" style="display: none;">
                <button onclick="loadLayout('./learn/layout/layout1.html')">MODELE 1</button>
                <button onclick="loadLayout('./learn/layout/layout2.html')">MODELE 2</button>
                <button onclick="loadLayout('./learn/layout/layout3.html')">MODELE 3</button>
            </div>

            <button class="btnExercise" onclick="showExercise()">EXERCICES</button>

            <div id="exerciseButtons" style="display: none;">
                <button onclick="loadLayout()">Exercice Grille (grid)</button>
                <button onclick="loadLayout()">Exercice Menu (déroulant)</button>
                <button onclick="loadLayout()">Exercice Bouton (hover)</button>
            </div>

            <div class="closeCenter">
                <button class="btnClose" onclick="closeWindow()">FERMER</button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.4/dist/purify.min.js"></script>
</body>
</html>
