<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Steps UI</title>
    <link rel="stylesheet" href="exercise2.css">
</head>

<body>
    <div class="container">
        <div class="title">Création d'un menu déroulant</div>
        <div class="timer" id="timer">** : ** : **</div>
        <div class="steps">
            <label class="step">
                <input type="checkbox">
                <div class="custom-checkbox"></div>
                <span>Créer la structure HTML du menu</span>
            </label>

            <label class="step">
                <input type="checkbox">
                <div class="custom-checkbox"></div>
                <span>Styliser le menu avec le CSS de base</span>
            </label>

            <label class="step">
                <input type="checkbox">
                <div class="custom-checkbox"></div>
                <span>Masquer et afficher le sous-menu avec CSS</span>
            </label>

            <label class="step">
                <input type="checkbox">
                <div class="custom-checkbox"></div>
                <span>Ajouter des effets au survol (hover) pour le menu déroulant</span>
            </label>
        </div>
        <div class="result" id="result"></div>
    </div>
    <script src="exercise2.js"></script>
</body>
</html>
