<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Steps UI</title>
    <link rel="stylesheet" href="exercise3.css">
</head>

<body>
    <div class="container">
        <div class="title">Création d'un bouton avec effet hover</div>
        <div class="timer" id="timer">** : ** : **</div>
        <div class="steps">
            <label class="step">
                <input type="checkbox">
                <div class="custom-checkbox"></div>
                <span>Créer le bouton</span>
            </label>

            <label class="step">
                <input type="checkbox">
                <div class="custom-checkbox"></div>
                <span>Ajouter un style dynamique au bouton</span>
            </label>

            <label class="step">
                <input type="checkbox">
                <div class="custom-checkbox"></div>
                <span>Créer l'effet hover</span>
            </label>

            <label class="step">
                <input type="checkbox">
                <div class="custom-checkbox"></div>
                <span>Tester et corriger</span>
            </label>
        </div>
        <div class="result" id="result"></div>
    </div>
    <script src="exercise3.js"></script>
</body>
</html>
