<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Steps UI</title>
    <link rel="stylesheet" href="exercise1.css">
</head>

<body>
    <div class="container">
        <div class="title">Création d’une grille CSS responsive</div>
        <div class="timer" id="timer">** : ** : **</div>
        <div class="steps">
            <label class="step">
                <input type="checkbox">
                <div class="custom-checkbox"></div>
                <span>Définir le conteneur en grid</span>
            </label>

            <label class="step">
                <input type="checkbox">
                <div class="custom-checkbox"></div>
                <span>Définir les colonnes et lignes</span>
            </label>

            <label class="step">
                <input type="checkbox">
                <div class="custom-checkbox"></div>
                <span>Placer les éléments</span>
            </label>

            <label class="step">
                <input type="checkbox">
                <div class="custom-checkbox"></div>
                <span>Ajuster les espacements et tailles</span>
            </label>
        </div>
        <div class="result" id="result"></div>
    </div>
    <script src="exercise1.js"></script>
</body>
</html>
